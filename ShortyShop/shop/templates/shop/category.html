{% extends "shop/base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="category-title">Categoría: {{ category }}</h2>

    {% if products %}
        <div class="row">
            {% for product in products %}
                <div class="col-md-4 mb-4">
                    <div class="card">
                        <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
                        <div class="card-body">
                            <h5 class="card-title">{{ product.name }}</h5>
                            <p class="card-text">${{ product.price }}</p>
                            <a href="{% url 'product_detail' product.id %}" class="btn btn-dark">Ver más</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-category-message">No hay productos en esta categoría.</p>
    {% endif %}
</div>
{% endblock %}
