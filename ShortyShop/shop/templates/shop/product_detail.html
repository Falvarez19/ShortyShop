{% extends 'shop/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <img src="{% static 'shop/images/product1.jpg' %}" alt="Producto 1" class="img-fluid rounded">
    </div>
    <div class="col-md-6">
        <h1>Nombre del Producto</h1>
        <p class="text-muted">Categoría: <strong>Zapatillas</strong></p>
        <p class="lead">Descripción del producto. Este producto es perfecto para cualquier ocasión.</p>
        <h4 class="text-danger">$50.00</h4>
        <form method="POST" action="/cart/">
            {% csrf_token %}
            <input type="hidden" name="product_id" value="1">
            <div class="mb-3">
                <label for="quantity" class="form-label">Cantidad</label>
                <input type="number" name="quantity" id="quantity" class="form-control" value="1" min="1">
            </div>
            <button type="submit" class="btn btn-dark">Agregar al Carrito</button>
        </form>
    </div>
</div>
{% endblock %}
